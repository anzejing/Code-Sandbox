services:
  code-sandbox:
    build: .
    container_name: code-sandbox-mcp
    restart: unless-stopped
    # stdio 模式需要保持 stdin 打开
    stdin_open: true
    tty: true
    # 从 .env 文件加载环境变量
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      # MCP 传输模式：stdio (默认) 或 http
      - MCP_TRANSPORT=${MCP_TRANSPORT:-stdio}
      # HTTP 模式配置（仅当 MCP_TRANSPORT=http 时使用）
      - MCP_HOST=${MCP_HOST:-0.0.0.0}
      - MCP_PORT=${MCP_PORT:-8765}
      # 沙箱配置
      - SANDBOX_TIMEOUT=${SANDBOX_TIMEOUT:-30}
      - MAX_MEMORY_MB=${MAX_MEMORY_MB:-512}
      # 缓存配置
      - ENABLE_CACHE=${ENABLE_CACHE:-true}
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE:-1000}
      - CACHE_TTL=${CACHE_TTL:-3600}
    # 资源限制（防止资源耗尽）
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # 健康检查（临时禁用，避免重启循环）
    # healthcheck:
    #   test: ["CMD", "python", "-c", "print('healthy')"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 60s
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # 安全配置
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    # HTTP 模式：开放端口（当 MCP_TRANSPORT=http 时取消注释）
    # 端口从 .env 文件读取，默认 8765
    # ports:
    #   - "${MCP_PORT:-8765}:${MCP_PORT:-8765}"
    # 禁用网络（如不需要访问外部 API）
    # network_mode: "none"
    # 或限制网络访问
    # networks:
    #   - sandbox-net

# 网络配置（可选）
# networks:
#   sandbox-net:
#     driver: bridge
#     ipam:
#       config:
#         - subnet: 172.28.0.0/16
